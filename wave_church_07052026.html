<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Give Us the Fountain of Living Water &mdash; Wave Church</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #faf8f5;
  --red:   #c0392b;
  --dark:  #1a1612;
  --mid:   #6b5e52;
  --light: #e4ddd4;
  --card:  #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--dark);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── STICKY HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--dark);
  padding: 14px 40px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.header-left { min-width: 0; }
.header-left .series-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,255,255,.55); font-weight: 500;
}
.header-left .header-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 20px; font-weight: 500; line-height: 1.25; color: #ffffff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.btn-copy-h {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.6); padding: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: color .2s;
}
.btn-copy-h:hover { color: #ffffff; }
.logo-link { display: block; }
.logo-link img { height: 44px; width: auto; display: block; }

/* ── HERO ── */
.hero {
  padding: 72px 40px 44px;
  max-width: 900px; margin: 0 auto;
}
.hero .hero-meta {
  font-size: 12px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--mid); font-weight: 500; margin-bottom: 18px;
}
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(40px, 7vw, 72px);
  font-weight: 600; line-height: 1.08; color: var(--dark);
  margin-bottom: 22px;
}
.hero .hero-summary {
  font-size: 15.5px; line-height: 1.7; color: var(--mid); max-width: 620px;
  font-weight: 300;
}

/* ── MAIN ── */
.main {
  max-width: 900px; margin: 0 auto;
  padding: 0 40px 90px;
}
hr.slide-sep {
  border: none; border-top: 1px solid var(--light);
  margin: 56px 0;
}
.sec-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(24px, 3.4vw, 32px);
  font-weight: 700; line-height: 1.25; color: var(--dark);
  margin-bottom: 30px;
}
.intro-p {
  font-size: 16px; line-height: 1.8; color: var(--mid);
  font-weight: 300; margin-bottom: 18px; max-width: 700px;
}

.passage { margin-bottom: 44px; }
.passage:last-child { margin-bottom: 0; }
.verse-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(23px, 3.8vw, 36px);
  font-weight: 600; line-height: 1.58; color: var(--dark);
}
.vn {
  font-size: .5em; font-weight: 500; color: var(--mid);
  vertical-align: super; margin-right: 5px;
}
.passage-ref {
  margin-top: 12px;
  font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--mid); font-weight: 500;
}

/* ── ANNOTATION SPANS ── */
.ann {
  position: relative;
  color: var(--red);
  cursor: pointer;
  transition: opacity .35s;
  -webkit-tap-highlight-color: transparent;
}
.ann .ul {
  position: absolute; left: 0; bottom: -2px;
  width: 100%; height: 7px;
  overflow: visible; pointer-events: none;
}
.ann .ul path {
  fill: none; stroke: var(--red); stroke-width: 2.4;
  stroke-linecap: round;
  stroke-dasharray: 105; stroke-dashoffset: 105;
}
.ann.active .ul path {
  animation: draw .55s ease forwards;
}
@keyframes draw { to { stroke-dashoffset: 0; } }
body.panel-open .ann:not(.active) { opacity: .4; }

/* ── SLIDE-UP BOTTOM PANEL ── */
#exp-panel {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
  background: var(--card);
  border-top: 2.5px solid var(--red);
  box-shadow: 0 -12px 40px rgba(26,22,18,.14);
  transform: translateY(105%);
  transition: transform .45s cubic-bezier(.22,.9,.3,1);
  max-height: 62vh;
  display: flex; flex-direction: column;
}
#exp-panel.open { transform: translateY(0); }
.panel-inner {
  max-width: 900px; margin: 0 auto; width: 100%;
  padding: 26px 40px 34px;
  overflow-y: auto;
}
.panel-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; margin-bottom: 14px;
}
.panel-keyword {
  font-size: 12px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--red); font-weight: 600; line-height: 1.5;
  padding-top: 4px;
}
.panel-close {
  background: none; border: 1px solid var(--light); border-radius: 50%;
  width: 32px; height: 32px; flex-shrink: 0;
  cursor: pointer; color: var(--mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; line-height: 1;
  transition: all .2s;
}
.panel-close:hover { border-color: var(--mid); color: var(--dark); }
.panel-rule {
  border: none; border-top: 1px solid var(--light); margin-bottom: 16px;
}
.panel-body {
  font-size: 15.5px; line-height: 1.75; color: var(--dark);
  font-weight: 300;
}
.panel-refs {
  margin-top: 16px;
  font-size: 12.5px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--mid); font-weight: 500;
}

/* ── SHARE ── */
.share {
  max-width: 900px; margin: 0 auto;
  padding: 0 40px 110px;
  text-align: center;
}
.share .btn-copy {
  display: inline-flex; align-items: center; gap: 9px;
  background: var(--dark); color: #fff;
  border: none; border-radius: 999px;
  padding: 13px 28px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .2s;
}
.share .btn-copy:hover { opacity: .85; }

/* ── TOAST ── */
#toast {
  position: fixed; left: 50%; bottom: 34px; z-index: 300;
  transform: translate(-50%, 20px);
  background: var(--dark); color: #fff;
  padding: 11px 22px; border-radius: 999px;
  font-size: 13.5px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: all .35s ease;
}
#toast.show { opacity: 1; transform: translate(-50%, 0); }

@media (max-width: 600px) {
  .site-header { padding: 12px 20px; }
  .hero { padding: 52px 20px 36px; }
  .main { padding: 0 20px 70px; }
  .share { padding: 0 20px 90px; }
  .panel-inner { padding: 22px 20px 28px; }
  hr.slide-sep { margin: 44px 0; }
}
</style>
</head>
